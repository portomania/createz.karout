<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREATEZ Karout – Kurierauftrag</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a4fd6; --blue-dark: #0f3aaa; --bg: #0d0d0d;
    --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --text: #e8e8e8; --muted: #888; --radius: 10px;
  }
  body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; color: #fff; }
  .logo span { color: var(--blue); }
  .badge { background: var(--blue); color: #fff; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; }
  .hero { background: linear-gradient(135deg, #0f1a3a 0%, #0d0d0d 100%); padding: 40px 24px 32px; text-align: center; border-bottom: 1px solid var(--border); }
  .hero h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; margin-bottom: 8px; }
  .hero h1 span { color: var(--blue); }
  .hero p { color: var(--muted); font-size: 0.95rem; }
  .container { max-width: 680px; margin: 0 auto; padding: 32px 20px 0; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--blue); margin-bottom: 18px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  label { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
  input, textarea, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 0.95rem; padding: 10px 14px; outline: none; width: 100%; font-family: inherit; transition: border-color 0.2s; }
  input:focus, textarea:focus, select:focus { border-color: var(--blue); }
  textarea { resize: vertical; min-height: 90px; }
  .priority-row { display: flex; gap: 10px; }
  .prio-btn { flex: 1; padding: 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; text-align: center; }
  .prio-btn.active { border-color: var(--blue); background: rgba(26,79,214,0.15); color: #fff; }
  .submit-btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .submit-btn:hover { background: var(--blue-dark); }
  .success { display: none; background: rgba(26,79,214,0.1); border: 1px solid var(--blue); border-radius: var(--radius); padding: 24px; text-align: center; margin-top: 20px; }
  .success h3 { color: var(--blue); margin-bottom: 8px; }
  .success p { color: var(--muted); font-size: 0.9rem; }
  @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <div class="logo">CREATE<span>Z</span></div>
  <div class="badge">Karout</div>
</header>
<div class="hero">
  <h1>CREATEZ <span>Karout</span></h1>
  <p>Kurierauftrag direkt an das Team – schnell, zuverlässig, flexibel.</p>
</div>
<div class="container">
  <form id="karoutForm">
    <div class="card">
      <h2>Auftragsdaten</h2>
      <div class="grid2">
        <div class="field"><label>Auftraggeber / Firma</label><input type="text" name="auftraggeber" placeholder="Name oder Firma" required></div>
        <div class="field"><label>Telefon</label><input type="tel" name="telefon" placeholder="+49..." required></div>
        <div class="field"><label>Datum</label><input type="date" name="datum" required></div>
        <div class="field"><label>Uhrzeit</label><input type="time" name="uhrzeit" required></div>
      </div>
    </div>
    <div class="card">
      <h2>Abholung &amp; Lieferung</h2>
      <div class="grid2">
        <div class="field full"><label>Abholadresse</label><input type="text" name="abholung" placeholder="Strasse, PLZ, Ort" required></div>
        <div class="field full"><label>Lieferadresse</label><input type="text" name="lieferung" placeholder="Strasse, PLZ, Ort" required></div>
      </div>
    </div>
    <div class="card">
      <h2>Sendungsdetails</h2>
      <div class="grid2">
        <div class="field"><label>Art der Sendung</label>
          <select name="art"><option value="">Bitte wählen</option><option>Dokumente</option><option>Paket</option><option>Equipment / Material</option><option>Sonstiges</option></select>
        </div>
        <div class="field"><label>Gewicht (ca.)</label><input type="text" name="gewicht" placeholder="z.B. 5 kg"></div>
        <div class="field full"><label>Priorität</label>
          <div class="priority-row">
            <div class="prio-btn active" onclick="setPrio(this,'Normal')">Normal</div>
            <div class="prio-btn" onclick="setPrio(this,'Express')">Express</div>
            <div class="prio-btn" onclick="setPrio(this,'Sofort')">Sofort</div>
          </div>
          <input type="hidden" name="prioritaet" id="prioritaet" value="Normal">
        </div>
        <div class="field full"><label>Bemerkungen</label><textarea name="bemerkungen" placeholder="Besondere Hinweise..."></textarea></div>
      </div>
    </div>
    <button type="submit" class="submit-btn">Auftrag absenden</button>
  </form>
  <div class="success" id="success">
    <h3>Auftrag eingegangen!</h3>
    <p>Das CREATEZ Karout-Team wurde benachrichtigt.</p>
  </div>
</div>
<script>
function setPrio(el,val){document.querySelectorAll(".prio-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");document.getElementById("prioritaet").value=val;}
document.getElementById("karoutForm").addEventListener("submit",function(e){e.preventDefault();document.getElementById("karoutForm").style.display="none";document.getElementById("success").style.display="block";});
</script>
</body>
</html>
